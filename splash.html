<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Starting PortSentry</title>
  <style>
    body {
      background: #0f1117;
      color: #e8eaf0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      -webkit-app-region: drag; /* Makes splash window draggable */
    }

    .container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-img {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-top: 8px;
    }

    .subtitle {
      font-size: 12px;
      color: #7a8299;
      margin-top: -8px;
    }

    .loader {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.05);
      border-top-color: #4f7ef8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-wrapper">
      <img src="icon.png" alt="Logo" class="logo-img" />
    </div>
    <div class="title">PortSentry</div>
    <div class="subtitle">Securing your local ports...</div>
    <div class="loader"></div>
  </div>

</body>
</html>
